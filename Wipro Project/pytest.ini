[pytest]
addopts = -ra --strict-markers --alluredir=allure-results
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: critical path tests
    regression: full regression suite
    login: login-related tests
    search: property search tests
    filters: property filter tests
    details: property details validation tests
    logout: logout workflow tests
    navigation: menu and navigation tests
    e2e: complete end-to-end workflow tests
